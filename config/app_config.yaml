apis:
  open_meteo:
    weather_forecast: "https://api.open-meteo.com/v1/forecast"
    weather_archive: "https://archive-api.open-meteo.com/v1/archive"
    air_quality: "https://air-quality-api.open-meteo.com/v1/air-quality"
    flood: "https://flood-api.open-meteo.com/v1/flood"
  nasa_power:
    base_url: "https://power.larc.nasa.gov/api/temporal"

data_collection:
  historical_start_date: "2023-01-01"
  weather:
    frequency_minutes: 60
    forecast_days: 16
    archive_variables:
      - "temperature_2m_max"
      - "temperature_2m_min"
      - "temperature_2m_mean"
      - "precipitation_sum"
      - "wind_speed_10m_max"
      - "relative_humidity_2m_mean"
      - "et0_fao_evapotranspiration"
    current_variables:
      - "temperature_2m"
      - "relative_humidity_2m"
      - "precipitation"
      - "wind_speed_10m"
      - "wind_direction_10m"
      - "pressure_msl"
      - "cloud_cover"
    daily_variables:
      - "temperature_2m_max"
      - "temperature_2m_min"
      - "precipitation_sum"
      - "precipitation_probability_max"
      - "wind_speed_10m_max"
      - "et0_fao_evapotranspiration"
      - "uv_index_max"

  air_quality:
    frequency_minutes: 120
    variables:
      - "pm10"
      - "pm2_5"
      - "carbon_monoxide"
      - "nitrogen_dioxide"
      - "sulphur_dioxide"
      - "ozone"
      - "dust"
      - "european_aqi"

  flood:
    frequency_minutes: 360
    forecast_days: 92

  climate:
    frequency_hours: 24
    nasa_parameters:
      - "T2M"
      - "T2M_MAX"
      - "T2M_MIN"
      - "PRECTOTCORR"
      - "RH2M"
      - "WS10M"
      - "ALLSKY_SFC_SW_DWN"

ml:
  training:
    initial_epochs: 50
    continuous_epochs: 10
    retrain_frequency_hours: 24
    min_data_points: 5
    test_size: 0.2
    random_state: 42
  models:
    weather:
      algorithm: "gradient_boosting"
      features: ["temperature_mean", "humidity", "precipitation", "wind_speed", "day_of_year", "month"]
      target_variables: ["temperature_max", "temperature_min", "precipitation", "humidity"]
      forecast_horizon_days: 7
    flood:
      algorithm: "random_forest"
      features: ["river_discharge", "precipitation_7d", "precipitation_30d", "month", "day_of_year"]
      target_variables: ["river_discharge", "flood_risk"]
      forecast_horizon_days: 30
    air_quality:
      algorithm: "gradient_boosting"
      features: ["pm10", "pm2_5", "dust", "temperature", "humidity", "wind_speed", "month"]
      target_variables: ["pm10", "pm2_5", "aqi"]
      forecast_horizon_days: 3
    drought:
      algorithm: "random_forest"
      features: ["precipitation_30d", "precipitation_90d", "temperature_mean", "evapotranspiration", "month"]
      target_variables: ["spi", "drought_risk"]
      forecast_horizon_days: 30

alerts:
  thresholds:
    # Débit fluvial (m³/s) — seuils adaptés aux rivières sahéliennes du Burkina Faso
    # Basé sur les percentiles GloFAS ERA5 et les crues historiques documentées :
    # - Nakambé/Ouagadougou : débit moyen saison sèche ~5–15 m³/s, crues sept. 2009/2024 > 200 m³/s
    # - Mouhoun (Volta Noire) : plus grand fleuve, crues majeures > 400 m³/s
    # - Seuil "faible" relevé à 20 pour éviter les faux positifs en saison sèche
    # Source : GloFAS v4 (Copernicus EMS), OCHA Burkina Faso flood reports 2020–2024
    flood:
      low: 20          # Débit saisonnier normal — vigilance simple
      moderate: 75     # ~Q2 (crue biennale) — surveillance renforcée
      high: 150        # ~Q5 (crue quinquennale) — alerte élevée, évacuation possible
      extreme: 300     # ~Q20 (crue vicennale) — urgence, crues type sept. 2009 (264mm/12h)

    # Indice AQI européen (EAQI) utilisé par Open-Meteo/CAMS
    # Contexte BF : PM2.5 annuel moyen = 43 µg/m³ (4× seuil OMS 10 µg/m³)
    # Harmattan (déc–fév) : PM2.5 peut dépasser 150–200 µg/m³
    # Source : UNEP/DICF Burkina Faso 2024, étude RSC Advances Ouagadougou 2024
    air_quality:
      good: 20         # EAQI Bon — rare au BF hors saison des pluies
      fair: 40         # EAQI Acceptable
      moderate: 60     # EAQI Modéré — dépasse souvent en saison sèche
      poor: 80         # EAQI Mauvais — courant en période harmattan
      very_poor: 100   # EAQI Très mauvais — pics harmattan / feux de brousse

    # Indice SPI (Standardized Precipitation Index) — standard OMM/NDMC
    # Valeurs négatives = déficit pluviométrique
    # Source : WMO Guidelines on SPI (2012), applicable Sahel
    drought:
      normal: -0.5     # SPI > -0.5 : situation normale
      moderate: -1.0   # SPI -0.5 à -1.0 : sécheresse modérée
      severe: -1.5     # SPI -1.0 à -1.5 : sécheresse sévère
      extreme: -2.0    # SPI < -2.0 : sécheresse extrême (type 1984, 2011)

    # Températures (°C) — basées sur données climatiques Ouagadougou
    # Moy. max avril (mois le plus chaud) : 39°C | Record absolu : 45.1°C (avril 1999, OMM)
    # Saison très chaude (mars–mai) : max quotidien moyen > 38°C
    # Min historique Ouagadougou : ~13°C (janv.) — risque froid quasi inexistant
    # Source : WeatherSpark / ERA5 Ouagadougou, OMM station 65503
    temperature:
      heat_warning: 40   # Dépasse la moyenne max de saison chaude (38–39°C) — vigilance
      heat_extreme: 43   # Seuil canicule sévère — rare mais documenté (> 43°C en avril/mai)
      cold_warning: 15   # Froid relatif sahelien — nuits fraîches janv./fév. nord BF
